# ---------- Fonts ----------
font:
  - file: "fonts/Roboto-Bold.ttf"
    id: font_large
    size: 24
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyzÆæØøÅåéèêàâùû0123456789 .,:;-/°%!?–()"
  - file: "fonts/Roboto-Regular.ttf"
    id: font_medium
    size: 18
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyzÆæØøÅåéèêàâùû0123456789 .,:;-/°%!•?–()"
  - file: "fonts/Roboto-Regular.ttf"
    id: font_small
    size: 14
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyzÆæØøÅåéèêàâùû0123456789 .,:;-/°%!•?–()"

# ---------- SPI ----------
spi:
  clk_pin: ${pin_spi_sck}
  mosi_pin: ${pin_spi_mosi}

# ---------- ePaper Display ----------
display:
  - platform: waveshare_epaper
    id: epaper
    cs_pin: ${pin_epaper_cs}
    dc_pin: ${pin_epaper_dc}
    busy_pin: ${pin_epaper_busy}
    reset_pin: ${pin_epaper_rst}
    model: 4.20in
    update_interval: never
    rotation: 0°
    lambda: |-
      const int W = 400;
      const int H = 300;
      const int M = 8;

      Color BG = COLOR_OFF;
      Color FG = COLOR_ON;

      // ── OTA / Maintenance mode skærm ──────────────────
      if (id(maintenance_active)) {
        it.fill(BG);
        it.print(M, 10,  id(font_large),  FG, "VEDLIGEHOLDELSE");
        it.print(M, 50,  id(font_medium), FG, "OTA MODE AKTIV");
        std::string ip = id(wifi_ip).state;
        it.print(M, 90,  id(font_small),  FG, ip.empty() ? "Venter pa WiFi..." : ip.c_str());
        it.print(M, 115, id(font_small),  FG, "Flash: esphome run --device (IP)");
        it.rectangle(0, 0, W, H, FG);
        return;
      }

      it.fill(BG);

      // ── Dato + tid (præformateret fra HA) ─────────────
      int y = M;
      std::string date_s = id(display_date).state;
      std::string time_s = id(display_time).state;
      if (!date_s.empty() && date_s != "unavailable") {
        it.print(M, y, id(font_large), FG, date_s.c_str());
        it.print(W - M, y, id(font_large), FG, TextAlign::TOP_RIGHT, time_s.c_str());
      } else {
        it.print(M, y, id(font_large), FG, "...");
      }

      y += 32;
      it.line(M, y, W - M, y, FG);
      y += 6;

      // ── Vejr (præformateret fra HA) ───────────────────
      std::string weather_s = id(display_weather).state;
      if (!weather_s.empty() && weather_s != "unavailable")
        it.print(M, y, id(font_medium), FG, weather_s.c_str());

      std::string indoor_s = id(display_indoor).state;
      if (!indoor_s.empty() && indoor_s != "unavailable")
        it.print(W - M, y, id(font_medium), FG, TextAlign::TOP_RIGHT, indoor_s.c_str());

      y += 24;

      std::string vnote = id(vejr_note).state;
      if (!vnote.empty() && vnote != "unavailable" && vnote != "unknown") {
        it.print(M, y, id(font_small), FG, vnote.c_str());
        y += 18;
      }

      y += 4;
      it.line(M, y, W - M, y, FG);
      y += 6;

      // ── Kalender ──────────────────────────────────────
      // Reserver plads til footer (alarm + batteri) nederst, så den altid er synlig.
      const int FOOTER_H = 24;               // footer total højde (linje + tekst)
      const int CAL_MAX_Y = H - FOOTER_H - 6; // sidste y hvor en kalender-linje må starte

      std::string hdr = id(cal_header).state;
      if (!hdr.empty() && hdr != "unavailable")
        it.print(M, y, id(font_medium), FG, hdr.c_str());
      y += 22;

      const std::string cal_events[] = {
        id(cal_event_1).state,  id(cal_event_2).state,
        id(cal_event_3).state,  id(cal_event_4).state,
        id(cal_event_5).state,  id(cal_event_6).state,
        id(cal_event_7).state,  id(cal_event_8).state,
        id(cal_event_9).state,  id(cal_event_10).state,
      };
      int vis = 0;
      for (int i = 0; i < 10 && y < CAL_MAX_Y; i++) {
        if (cal_events[i].empty() || cal_events[i] == "unavailable") continue;
        char linje[64];
        snprintf(linje, sizeof(linje), "• %.60s", cal_events[i].c_str());
        it.print(M, y, id(font_small), FG, linje);
        y += 17;
        vis++;
      }
      if (vis == 0) {
        std::string no_ev = id(no_events_msg).state;
        it.print(M, y, id(font_small), FG, no_ev.empty() ? "..." : no_ev.c_str());
      }

      // ── Footer: alarm (venstre) + batteri % (højre) ──────────
      // Fast placering nederst så den aldrig klippes af kalender-overløb.
      int footer_y = H - FOOTER_H + 4;       // giver ~14px til font_small
      int line_y   = H - FOOTER_H - 2;       // skillelinje lige over footer
      it.line(M, line_y, W - M, line_y, FG);

      std::string alarm_s = id(display_alarm).state;
      if (!alarm_s.empty() && alarm_s != "unavailable")
        it.print(M, footer_y, id(font_small), FG, alarm_s.c_str());

      // Vis altid batteri-feltet: "--%" hvis publish_battery_percent_from_avg
      // ikke kørte (begge ADC-maalinger NaN) -- så vi kan skelne layout-fejl
      // fra maaling-fejl paa skærmen.
      char bat_str[16];
      if (!isnan(id(battery_percent).state)) {
        snprintf(bat_str, sizeof(bat_str), "Bat: %d%%", (int)id(battery_percent).state);
      } else {
        snprintf(bat_str, sizeof(bat_str), "Bat: --%%");
      }
      it.print(W - M, footer_y, id(font_small), FG, TextAlign::TOP_RIGHT, bat_str);

      // ── Ramme ─────────────────────────────────────────
      it.rectangle(0, 0, W, H, FG);
