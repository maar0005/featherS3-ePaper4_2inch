    internal: true
    lambda: 'return {""};'
    update_interval: never

  - platform: template
    id: vejr_note
    internal: true
    lambda: 'return {""};'
    update_interval: never

  - platform: template
    id: display_alarm
    internal: true
    lambda: 'return {""};'
    update_interval: never

  - platform: template
    id: cal_header
    internal: true
    lambda: 'return {""};'
    update_interval: never

  - platform: template
    id: no_events_msg
    internal: true
    lambda: 'return {""};'
    update_interval: never

  - platform: template
    id: cal_event_1
    internal: true
    lambda: 'return {""};'
    update_interval: never

  - platform: template
    id: cal_event_2
    internal: true
    lambda: 'return {""};'
    update_interval: never

  - platform: template
    id: cal_event_3
    internal: true
    lambda: 'return {""};'
    update_interval: never

  - platform: template
    id: cal_event_4
    internal: true
