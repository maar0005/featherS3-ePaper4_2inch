# ┌─────────────────────────────────────────────────────────────────────────────┐
# │  USER CONFIGURATION — edit these before flashing                           │
# │  Credentials (WiFi, API key, HA URL/token) go in secrets.yaml             │
# └─────────────────────────────────────────────────────────────────────────────┘

substitutions:
  # GPIO pin assignments
  # ESP32-S3-DevKitC-1 N16R8 defaults shown. See README for FeatherS3 pinout.
  pin_spi_mosi:    "GPIO11"   # ePaper DIN
  pin_spi_sck:     "GPIO12"   # ePaper CLK
  pin_epaper_cs:   "GPIO10"   # ePaper CS
  pin_epaper_dc:   "GPIO6"    # ePaper DC
  pin_epaper_rst:  "GPIO5"    # ePaper RST
  pin_epaper_busy: "GPIO4"    # ePaper BUSY
  pin_battery:     "GPIO2"    # Battery voltage ADC — must be an ADC1 pin
  pin_maintenance: "GPIO3"    # Maintenance/wake pin: press during sleep = early wake; hold on fresh boot = OTA mode
  pin_wakeup:      "GPIO0"    # Additional wake pin (BOOT button) — also wakes from sleep

# ─────────────────────────────────────────────────────────────────────────────
esphome:
  name: entre-display
  friendly_name: Entre Display
  on_boot:
    - priority: 600
      then:
        - lambda: |-
            // Latch maintenance mode: only active on a fresh boot (not deep-sleep wake)
            // with GPIO3 pulled LOW. Configure pin before binary_sensor initialises.
            gpio_reset_pin(GPIO_NUM_3);
            gpio_set_direction(GPIO_NUM_3, GPIO_MODE_INPUT);
            gpio_set_pull_mode(GPIO_NUM_3, GPIO_PULLUP_ONLY);
            esp_sleep_wakeup_cause_t cause = esp_sleep_get_wakeup_cause();
            if (cause == ESP_SLEEP_WAKEUP_UNDEFINED && gpio_get_level(GPIO_NUM_3) == 0) {
              id(maintenance_active) = true;
              ESP_LOGI("boot", "Maintenance mode aktiveret (fresh boot + GPIO3 LOW)");
            }
    - priority: -100
      then:
        - script.execute: update_and_sleep

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESPTOOLPY_FLASHSIZE_16MB: "y"
      CONFIG_SPIRAM_MODE_OCT: "y"
      CONFIG_SPIRAM_SPEED_80M: "y"

logger:
  level: DEBUG
  hardware_uart: USB_CDC
  logs:
    sensor: DEBUG
    text_sensor: DEBUG
    display: DEBUG
    wifi: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  fast_connect: true
  ap:
    ssid: "Entre-Display Setup"
    password: "display123"
  on_connect:
    - logger.log: "WiFi forbundet!"
  on_disconnect:
    - logger.log: "WiFi mistet forbindelsen"

captive_portal:

web_server:
  port: 80

# api: bevares til OTA-opdateringer og tidssynkronisering (time: homeassistant kræver native API)
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome

# ---------- Globals ----------
globals:
  - id: data_received
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: maintenance_active
    type: bool
    restore_value: no
    initial_value: 'false'

# ---------- HTTP Request (pull-model) ----------
# Tilføj følgende til secrets.yaml:
#   ha_template_url: "http://192.168.x.x:8123/api/template"
#   ha_authorization: "Bearer DIT_LONG_LIVED_TOKEN_HER"
http_request:
  id: http_client
  timeout: 10s
  verify_ssl: false
  buffer_size_rx: 2048
  buffer_size_tx: 2048

# ---------- JSON parsing ----------
json:

# ---------- Tid via Home Assistant ----------
time:
  - platform: homeassistant
    id: sntp_time
    timezone: Europe/Copenhagen

# ---------- Deep Sleep ----------
deep_sleep:
  id: deep_sleep_control
  sleep_duration: 30min
  # Wakeup pins are configured manually in the script so both GPIO0 and GPIO3
  # can be used. ESPHome's wakeup_pin: only supports one pin.

# ---------- Interval: opdater display hvert minut i OTA/maintenance mode ----------
interval:
  - interval: 60s
    then:
      - if:
          condition:
            lambda: 'return id(maintenance_active);'
          then:
            - component.update: epaper

# ---------- Script: vent på WiFi, pull data via REST, opdater display, sov ----------
# Logik:
#   1. Vent på WiFi (max 30s)
#   2. Send HTTP POST til HA og sæt data_received=true ved success
#   3. Vent til data_received=true – eller max 30s
#   4. Opdater display
#   5. Vent på BUSY=LOW (display refresh færdig), sov derefter
script:
  - id: update_and_sleep
    then:
      - deep_sleep.prevent: deep_sleep_control
      - lambda: 'id(data_received) = false;'
      - wait_until:
          condition:
            wifi.connected:
          timeout: 30s
      - if:
          condition:
            wifi.connected:
          then:
            - logger.log: "WiFi OK – henter data fra HA REST API..."
            - http_request.post:
                url: !secret ha_template_url
                request_headers:
                  Authorization: !secret ha_authorization
                  Content-Type: "application/json"
                # Henter præ-formaterede strenge fra HA template sensorer.
                # Al sprog- og formateringslogik ligger i HA_config_epaper.yaml.
                body: !lambda |-
                  return R"json({"template":"{{ {'date_str':states('sensor.display_date_str'),'time_str':states('sensor.display_time_str'),'weather_str':states('sensor.display_weather_str'),'indoor_str':states('sensor.display_indoor_str'),'vejr_note':states('input_text.display_vejr_note'),'alarm_str':states('sensor.display_alarm_str'),'cal_header':state_attr('sensor.display_lang','cal_header'),'no_events_msg':state_attr('sensor.display_lang','no_events'),'e1':states('input_text.display_event_1'),'e2':states('input_text.display_event_2'),'e3':states('input_text.display_event_3'),'e4':states('input_text.display_event_4'),'e5':states('input_text.display_event_5'),'e6':states('input_text.display_event_6'),'e7':states('input_text.display_event_7'),'e8':states('input_text.display_event_8'),'e9':states('input_text.display_event_9'),'e10':states('input_text.display_event_10')}|tojson }}"})json";
                on_response:
                  then:
                    - lambda: |-
                        if (response->status_code != 200) {
                          ESP_LOGW("ha_pull", "HTTP fejl fra HA: status %d", response->status_code);
                          return;
                        }
                        std::string body;
                        body.reserve(response->content_length > 0 ? response->content_length : 512);
                        uint8_t buf[128];
                        int n;
                        while ((n = response->read(buf, sizeof(buf))) > 0)
                          body.append(reinterpret_cast<char*>(buf), n);
                        bool ok = json::parse_json(body, [](JsonObject root) {
                          id(display_date).publish_state(root["date_str"] | "");
                          id(display_time).publish_state(root["time_str"] | "");
                          id(display_weather).publish_state(root["weather_str"] | "");
                          id(display_indoor).publish_state(root["indoor_str"] | "");
                          id(vejr_note).publish_state(root["vejr_note"] | "");
                          id(display_alarm).publish_state(root["alarm_str"] | "");
                          id(cal_header).publish_state(root["cal_header"] | "");
                          id(no_events_msg).publish_state(root["no_events_msg"] | "");
                          id(cal_event_1).publish_state(root["e1"] | "");
                          id(cal_event_2).publish_state(root["e2"] | "");
                          id(cal_event_3).publish_state(root["e3"] | "");
                          id(cal_event_4).publish_state(root["e4"] | "");
                          id(cal_event_5).publish_state(root["e5"] | "");
                          id(cal_event_6).publish_state(root["e6"] | "");
                          id(cal_event_7).publish_state(root["e7"] | "");
                          id(cal_event_8).publish_state(root["e8"] | "");
                          id(cal_event_9).publish_state(root["e9"] | "");
                          id(cal_event_10).publish_state(root["e10"] | "");
                          return true;
                        });
                        if (ok) {
                          ESP_LOGI("ha_pull", "Data modtaget og parsed OK");
                          id(data_received) = true;
                        } else {
                          ESP_LOGW("ha_pull", "JSON parse fejl");
                        }
            # HTTP er synkront – data_received er allerede sat hvis det lykkedes.
            # wait_until nedenfor håndterer edge cases og giver en klar max-grænse.
            - wait_until:
                condition:
                  lambda: 'return id(data_received);'
                timeout: 30s
            - if:
                condition:
                  lambda: 'return id(data_received);'
                then:
                  - logger.log: "✓ Data bekræftet – opdaterer display"
                else:
                  - logger.log: "✗ Ingen data fra HA (timeout/fejl) – opdaterer display med gamle værdier"
          else:
            - logger.log: "WiFi timeout – opdaterer display uden friske data"
      - repeat:
          count: 3
          then:
            - component.update: battery_voltage
            - delay: 1s
      - wait_until:
          condition:
            lambda: 'return !isnan(id(battery_percent).state);'
          timeout: 10s
      - if:
          condition:
            lambda: 'return esp_sleep_get_wakeup_cause() == ESP_SLEEP_WAKEUP_UNDEFINED;'
          then:
            - component.update: epaper
            - wait_until:
                condition:
                  lambda: 'return gpio_get_level(GPIO_NUM_4) == 0;'
                timeout: 15s
            - delay: 1s
      - component.update: epaper
      - wait_until:
          condition:
            lambda: 'return gpio_get_level(GPIO_NUM_4) == 0;'
          timeout: 15s
      - delay: 3s
      - if:
          condition:
            binary_sensor.is_on: maintenance_mode
          then:
            - logger.log: "Maintenance mode aktiv – deep sleep forhindret (OTA klar)"
          else:
            - lambda: |-
                // GPIO0 (BOOT) and GPIO3 (maintenance/wake) both wake from deep sleep.
                // Using ext1 with a bitmask since ESP32-S3 doesn't support ext0.
                // ANY_LOW: either pin going LOW wakes the device.
                uint64_t mask = (1ULL << GPIO_NUM_0) | (1ULL << GPIO_NUM_3);
                esp_sleep_enable_ext1_wakeup(mask, ESP_EXT1_WAKEUP_ANY_LOW);
            - deep_sleep.enter: deep_sleep_control

# ---------- Maintenance mode pin (GPIO3, active LOW – sæt til GND for at forhindre deep sleep) ----------
binary_sensor:
  - platform: gpio
    pin:
      number: ${pin_maintenance}
      mode: INPUT_PULLUP
      inverted: true
    id: maintenance_mode
    name: "Maintenance Mode"
    internal: true

# ---------- Battery -------------------------------------------------------
sensor:
  - platform: adc
    pin: ${pin_battery}
    id: battery_voltage
    name: "Battery Voltage"
    update_interval: 30s
    attenuation: 12db
    samples: 16
    filters:
      - multiply: 2.0
      - sliding_window_moving_average:
          window_size: 3
          send_every: 1
    unit_of_measurement: "V"
    accuracy_decimals: 2
    on_value:
      - lambda: |-
          // Publish battery_percent immediately when ADC gets a reading.
          // Li-ion S-curve LUT (piecewise linear). x = compensated voltage.
          float bp;
          if      (x >= 4.20f) bp = 100.0f;
          else if (x >= 4.10f) bp = 90.0f + (x - 4.10f) / 0.10f * 10.0f;
          else if (x >= 4.00f) bp = 80.0f + (x - 4.00f) / 0.10f * 10.0f;
          else if (x >= 3.90f) bp = 70.0f + (x - 3.90f) / 0.10f * 10.0f;
          else if (x >= 3.80f) bp = 60.0f + (x - 3.80f) / 0.10f * 10.0f;
          else if (x >= 3.70f) bp = 50.0f + (x - 3.70f) / 0.10f * 10.0f;
          else if (x >= 3.60f) bp = 40.0f + (x - 3.60f) / 0.10f * 10.0f;
          else if (x >= 3.50f) bp = 30.0f + (x - 3.50f) / 0.10f * 10.0f;
          else if (x >= 3.40f) bp = 20.0f + (x - 3.40f) / 0.10f * 10.0f;
          else if (x >= 3.30f) bp = 10.0f + (x - 3.30f) / 0.10f * 10.0f;
          else if (x >= 3.20f) bp =  5.0f + (x - 3.20f) / 0.10f *  5.0f;
          else if (x >= 3.10f) bp =  2.0f + (x - 3.10f) / 0.10f *  3.0f;
          else if (x >= 3.00f) bp =  0.0f + (x - 3.00f) / 0.10f *  2.0f;
          else                 bp =  0.0f;
          id(battery_percent).publish_state(bp);

  - platform: template
    id: battery_percent
    name: "Battery Percent"
    unit_of_measurement: "%"
    accuracy_decimals: 0
    icon: "mdi:battery"
    update_interval: never

# ---------- Text sensors (udfyldes via publish_state() i HTTP on_response-lambdaen) ----------
# Al formatering og sprogtilpasning sker i HA – se HA_config_epaper.yaml.
text_sensor:
