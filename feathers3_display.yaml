esphome:
  name: entre-display
  friendly_name: Entre Display
  on_boot:
    - priority: 600      # LDO2 tændes tidligst muligt
      then:
        - output.turn_on: ldo2_enable
    - priority: -100     # Kør script efter alle komponenter (inkl. WiFi) er initialiseret
      then:
        - script.execute: update_and_sleep

esp32:
  board: um_feathers3
  variant: esp32s3
  framework:
    type: esp-idf

logger:
  level: DEBUG
  hardware_uart: USB_CDC
  logs:
    sensor: DEBUG
    text_sensor: DEBUG
    display: DEBUG
    wifi: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  fast_connect: true
  on_connect:
    - logger.log: "WiFi forbundet!"
  on_disconnect:
    - logger.log: "WiFi mistet forbindelsen"

# api: bevares til OTA-opdateringer og tidssynkronisering (time: homeassistant kræver native API)
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome

# ---------- Globals ----------
globals:
  - id: data_received
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: ha_hour
    type: int
    restore_value: no
    initial_value: '-1'
  - id: ha_minute
    type: int
    restore_value: no
    initial_value: '0'
  - id: ha_weekday
    type: int
    restore_value: no
    initial_value: '0'
  - id: ha_day
    type: int
    restore_value: no
    initial_value: '0'
  - id: ha_month
    type: int
    restore_value: no
    initial_value: '0'
  - id: ha_year
    type: int
    restore_value: no
    initial_value: '0'

# ---------- HTTP Request (pull-model) ----------
# Tilføj følgende til secrets.yaml:
#   ha_template_url: "http://192.168.x.x:8123/api/template"
#   ha_authorization: "Bearer DIT_LONG_LIVED_TOKEN_HER"
http_request:
  id: http_client
  timeout: 10s
  verify_ssl: false
  buffer_size_rx: 2048
  buffer_size_tx: 2048

# ---------- JSON parsing ----------
json:

# ---------- Tid via Home Assistant ----------
time:
  - platform: homeassistant
    id: sntp_time
    timezone: Europe/Copenhagen

# ---------- Deep Sleep ----------
deep_sleep:
  id: deep_sleep_control
  sleep_duration: 10min
  wakeup_pin:
    number: GPIO0
    inverted: true

# ---------- Script: vent på WiFi, pull data via REST, opdater display, sov ----------
# Logik:
#   1. Vent på WiFi (max 30s)
#   2. Send HTTP POST til HA og sæt data_received=true ved success
#   3. Vent til data_received=true – eller max 60s total fra start
#   4. Opdater display og sov
script:
  - id: update_and_sleep
    then:
      - deep_sleep.prevent: deep_sleep_control
      - lambda: 'id(data_received) = false;'
      - wait_until:
          condition:
            wifi.connected:
          timeout: 30s
      - if:
          condition:
            wifi.connected:
          then:
            - logger.log: "WiFi OK – henter data fra HA REST API..."
            - http_request.post:
                url: !secret ha_template_url
                request_headers:
                  Authorization: !secret ha_authorization
                  Content-Type: "application/json"
                # Body: JSON payload med én Jinja2-template der returnerer alle
                # nødvendige sensorværdier som ét JSON-objekt via tojson-filteret.
                # float(none) → null i JSON hvis sensoren er unavailable.
                body: !lambda |-
                  return R"json({"template":"{% set n=now() %}{% set d={'outdoor_temp':states('sensor.dantherm_outdoor_temperature')|float(none),'indoor_temp':states('sensor.dantherm_extract_temperature')|float(none),'weather_state':states('weather.forecast_home'),'vejr_note':states('input_text.display_vejr_note'),'alarm_status':states('alarm_control_panel.home'),'cal_event_1':states('input_text.display_event_1'),'cal_event_2':states('input_text.display_event_2'),'cal_event_3':states('input_text.display_event_3'),'cal_event_4':states('input_text.display_event_4'),'cal_event_5':states('input_text.display_event_5'),'cal_event_6':states('input_text.display_event_6'),'cal_event_7':states('input_text.display_event_7'),'cal_event_8':states('input_text.display_event_8'),'cal_event_9':states('input_text.display_event_9'),'cal_event_10':states('input_text.display_event_10'),'ha_hour':n.hour,'ha_minute':n.minute,'ha_weekday':n.strftime('%w')|int,'ha_day':n.day,'ha_month':n.month,'ha_year':n.year} %}{{d|tojson}}"})json";
                on_response:
                  then:
                    - lambda: |-
                        if (response->status_code != 200) {
                          ESP_LOGW("ha_pull", "HTTP fejl fra HA: status %d", response->status_code);
                          return;
                        }
                        std::string body;
                        body.reserve(response->content_length > 0 ? response->content_length : 512);
                        uint8_t buf[128];
                        int n;
                        while ((n = response->read(buf, sizeof(buf))) > 0)
                          body.append(reinterpret_cast<char*>(buf), n);
                        bool ok = json::parse_json(body, [](JsonObject root) {
                          if (!root["outdoor_temp"].isNull())
                            id(outdoor_temp).publish_state(root["outdoor_temp"].as<float>());
                          if (!root["indoor_temp"].isNull())
                            id(indoor_temp).publish_state(root["indoor_temp"].as<float>());
                          id(weather_state).publish_state(root["weather_state"] | "unknown");
                          id(vejr_note).publish_state(root["vejr_note"] | "");
                          id(alarm_status).publish_state(root["alarm_status"] | "unknown");
                          id(cal_event_1).publish_state(root["cal_event_1"] | "");
                          id(cal_event_2).publish_state(root["cal_event_2"] | "");
                          id(cal_event_3).publish_state(root["cal_event_3"] | "");
                          id(cal_event_4).publish_state(root["cal_event_4"] | "");
                          id(cal_event_5).publish_state(root["cal_event_5"] | "");
                          id(cal_event_6).publish_state(root["cal_event_6"] | "");
                          id(cal_event_7).publish_state(root["cal_event_7"] | "");
                          id(cal_event_8).publish_state(root["cal_event_8"] | "");
                          id(cal_event_9).publish_state(root["cal_event_9"] | "");
                          id(cal_event_10).publish_state(root["cal_event_10"] | "");
                          id(ha_hour)    = root["ha_hour"]    | -1;
                          id(ha_minute)  = root["ha_minute"]  | 0;
                          id(ha_weekday) = root["ha_weekday"] | 0;
                          id(ha_day)     = root["ha_day"]     | 0;
                          id(ha_month)   = root["ha_month"]   | 0;
                          id(ha_year)    = root["ha_year"]    | 0;
                          return true;
                        });
                        if (ok) {
                          ESP_LOGI("ha_pull", "Data modtaget og parsed OK");
                          id(data_received) = true;
                        } else {
                          ESP_LOGW("ha_pull", "JSON parse fejl");
                        }
            # HTTP er synkront – data_received er allerede sat hvis det lykkedes.
            # wait_until nedenfor håndterer edge cases og giver en klar max-grænse.
            - wait_until:
                condition:
                  lambda: 'return id(data_received);'
                timeout: 30s
            - if:
                condition:
                  lambda: 'return id(data_received);'
                then:
                  - logger.log: "✓ Data bekræftet – opdaterer display"
                else:
                  - logger.log: "✗ Ingen data fra HA (timeout/fejl) – opdaterer display med gamle værdier"
          else:
            - logger.log: "WiFi timeout – opdaterer display uden friske data"
      - component.update: epaper
      - delay: 10s        # Waveshare 4.2" bruger 4-6s på fuldt refresh
      - output.turn_off: ldo2_enable
      - if:
          condition:
            binary_sensor.is_on: maintenance_mode
          then:
            - logger.log: "Maintenance mode aktiv – deep sleep forhindret (OTA klar)"
          else:
            - deep_sleep.enter: deep_sleep_control

# ---------- Maintenance mode pin (GPIO3, active LOW – sæt til GND for at forhindre deep sleep) ----------
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO3
      mode: INPUT_PULLUP
      inverted: true
    id: maintenance_mode
    name: "Maintenance Mode"
    internal: true

# ---------- LDO2 enable (GPIO39 → 3V3_SW → display VCC) ----------
output:
  - platform: gpio
    pin: GPIO39
    id: ldo2_enable

# ---------- Battery (sensor til HA, vises ikke på display) ----------
sensor:
  - platform: adc
    pin: GPIO2
    id: battery_voltage
    name: "Battery Voltage"
    update_interval: 30s
    attenuation: 12db
    filters:
      - multiply: 2.0
    unit_of_measurement: "V"
    accuracy_decimals: 2

  # Udfyldes via publish_state() i HTTP on_response-lambdaen ovenfor.
  # Initial state er NAN så display-koden kan skelne "ingen data" fra "0.0°C".
  - platform: template
    id: outdoor_temp
    name: "Outdoor Temperature"
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    internal: true
    lambda: 'return NAN;'
    update_interval: never

  - platform: template
    id: indoor_temp
    name: "Indoor Temperature"
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    internal: true
    lambda: 'return NAN;'
    update_interval: never

# ---------- Text sensors (udfyldes via publish_state() i HTTP on_response-lambdaen) ----------
text_sensor:
  - platform: template
    id: weather_state
    name: "Weather State"
    internal: true
    lambda: 'return {"unavailable"};'
    update_interval: never

  - platform: template
    id: cal_event_1
    name: "Calendar Event 1"
    internal: true
    lambda: 'return {""};'
    update_interval: never

  - platform: template
    id: cal_event_2
    name: "Calendar Event 2"
    internal: true
    lambda: 'return {""};'
    update_interval: never

  - platform: template
    id: cal_event_3
    name: "Calendar Event 3"
    internal: true
    lambda: 'return {""};'
    update_interval: never

  - platform: template
    id: cal_event_4
    name: "Calendar Event 4"
    internal: true
    lambda: 'return {""};'
    update_interval: never

  - platform: template
    id: cal_event_5
    name: "Calendar Event 5"
    internal: true
    lambda: 'return {""};'
    update_interval: never

  - platform: template
    id: cal_event_6
    name: "Calendar Event 6"
    internal: true
    lambda: 'return {""};'
    update_interval: never

  - platform: template
    id: cal_event_7
    name: "Calendar Event 7"
    internal: true
    lambda: 'return {""};'
    update_interval: never

  - platform: template
    id: cal_event_8
    name: "Calendar Event 8"
    internal: true
    lambda: 'return {""};'
    update_interval: never

  - platform: template
    id: cal_event_9
    name: "Calendar Event 9"
    internal: true
    lambda: 'return {""};'
    update_interval: never

  - platform: template
    id: cal_event_10
    name: "Calendar Event 10"
    internal: true
    lambda: 'return {""};'
    update_interval: never

  - platform: template
    id: vejr_note
    name: "Vejr Note"
    internal: true
    lambda: 'return {""};'
    update_interval: never

  - platform: template
    id: alarm_status
    name: "Alarm Status"
    internal: true
    lambda: 'return {"unknown"};'
    update_interval: never

# ---------- Fonts ----------
font:
  - file: "fonts/Roboto-Bold.ttf"
    id: font_large
    size: 24
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyzÆæØøÅå0123456789 .,:;-/°%!?–"
  - file: "fonts/Roboto-Regular.ttf"
    id: font_medium
    size: 18
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyzÆæØøÅå0123456789 .,:;-/°%!•?–()"
  - file: "fonts/Roboto-Regular.ttf"
    id: font_small
    size: 14
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyzÆæØøÅå0123456789 .,:;-/°%!•?–()"

# ---------- SPI ----------
spi:
  clk_pin: GPIO12
  mosi_pin: GPIO11

# ---------- ePaper Display ----------
display:
  - platform: waveshare_epaper
    id: epaper
    cs_pin: GPIO10
    dc_pin: GPIO5
    busy_pin: GPIO6
    reset_pin: GPIO14
    model: 4.20in
    update_interval: never
    rotation: 0°
    lambda: |-
      const int W = 400;
      const int H = 300;
      const int M = 8;  // margin

      Color BG = COLOR_OFF;  // hvid baggrund
      Color FG = COLOR_ON;   // sort tekst

      it.fill(BG);

      // ── Dato + tid (fra HA HTTP response) ─────────────
      int y = M;
      if (id(ha_hour) >= 0) {
        const char* ugedage[] = {
          "Søndag","Mandag","Tirsdag","Onsdag","Torsdag","Fredag","Lørdag"
        };
        const char* maaneder[] = {
          "","jan","feb","mar","apr","maj","jun","jul","aug","sep","okt","nov","dec"
        };
        char dato[32];
        snprintf(dato, sizeof(dato), "%s %d. %s %d",
          ugedage[id(ha_weekday)], id(ha_day),
          maaneder[id(ha_month)], id(ha_year));
        it.print(M, y, id(font_large), FG, dato);

        char tid[8];
        snprintf(tid, sizeof(tid), "%02d:%02d", id(ha_hour), id(ha_minute));
        it.print(W - M, y, id(font_large), FG, TextAlign::TOP_RIGHT, tid);
      } else {
        it.print(M, y, id(font_large), FG, "Ingen tid");
      }

      y += 32;
      it.line(M, y, W - M, y, FG);
      y += 6;

      // ── Vejr + temperaturer ───────────────────────────
      std::string ws = id(weather_state).state;
      const char* vejr =
        ws == "sunny"            ? "Solskin" :
        ws == "clear-night"      ? "Klar nat" :
        ws == "partlycloudy"     ? "Lidt skyer" :
        ws == "cloudy"           ? "Overskyet" :
        ws == "rainy"            ? "Regnvejr" :
        ws == "pouring"          ? "Kraftigt regn" :
        ws == "snowy"            ? "Snevejr" :
        ws == "snowy-rainy"      ? "Slud" :
        ws == "windy"            ? "Blæsevejr" :
        ws == "windy-variant"    ? "Blæsevejr" :
        ws == "fog"              ? "Tåget" :
        ws == "hail"             ? "Haglvejr" :
        ws == "lightning"        ? "Tordenvejr" :
        ws == "lightning-rainy"  ? "Torden og regn" :
        ws == "exceptional"      ? "Usædvanligt" : "?";

      float ude  = id(outdoor_temp).state;
      float inde = id(indoor_temp).state;

      // Vejr + udetemperatur på én linje
      char vejr_linje[48];
      if (!isnan(ude))
        snprintf(vejr_linje, sizeof(vejr_linje), "%s, %.1f°", vejr, ude);
      else
        snprintf(vejr_linje, sizeof(vejr_linje), "%s", vejr);
      it.print(M, y, id(font_medium), FG, vejr_linje);

      // Indendørs temp højrejusteret (skjul hvis 0 eller unavailable)
      if (!isnan(inde) && inde != 0.0f) {
        char inde_str[16];
        snprintf(inde_str, sizeof(inde_str), "Inde %.1f°", inde);
        it.print(W - M, y, id(font_medium), FG, TextAlign::TOP_RIGHT, inde_str);
      }

      y += 24;

      // Vejr-note fra HA forecast ("Regn fra kl. 14")
      std::string vnote = id(vejr_note).state;
      if (!vnote.empty() && vnote != "unavailable" && vnote != "unknown") {
        it.print(M, y, id(font_small), FG, vnote.c_str());
        y += 18;
      }

      y += 4;
      it.line(M, y, W - M, y, FG);
      y += 6;

      // ── Kalender (præformateret fra HA) ──────────────
      it.print(M, y, id(font_medium), FG, "KALENDER");
      y += 22;

      const std::string cal_events[] = {
        id(cal_event_1).state,  id(cal_event_2).state,
        id(cal_event_3).state,  id(cal_event_4).state,
        id(cal_event_5).state,  id(cal_event_6).state,
        id(cal_event_7).state,  id(cal_event_8).state,
        id(cal_event_9).state,  id(cal_event_10).state,
      };
      int vis = 0;
      for (int i = 0; i < 10 && y < H - 28; i++) {
        if (cal_events[i].empty() || cal_events[i] == "unavailable") continue;
        char linje[64];
        snprintf(linje, sizeof(linje), "• %.60s", cal_events[i].c_str());
        it.print(M, y, id(font_small), FG, linje);
        y += 17;
        vis++;
      }
      if (vis == 0) {
        it.print(M, y, id(font_small), FG, "Ingen kommende events");
        y += 17;
      }

      y += 4;
      it.line(M, y, W - M, y, FG);
      y += 6;

      // ── Alarm ─────────────────────────────────────────
      std::string alarm = id(alarm_status).state;
      const char* alarm_txt =
        (alarm == "armed_away" || alarm == "armed_home") ? "Alarm: ARMET" :
        alarm == "disarmed"  ? "Alarm: FRA" :
        alarm == "triggered" ? "Alarm: UDLOEST" : "Alarm: ?";
      it.print(M, y, id(font_small), FG, alarm_txt);

      // ── Ramme ─────────────────────────────────────────
      it.rectangle(0, 0, W, H, FG);
