# ---------- Input Text helpers ----------
input_text:
  display_event_1:
    name: "Display Event 1"
    max: 255
  display_event_2:
    name: "Display Event 2"
    max: 255
  display_event_3:
    name: "Display Event 3"
    max: 255
  display_event_4:
    name: "Display Event 4"
    max: 255
  display_event_5:
    name: "Display Event 5"
    max: 255
  display_event_6:
    name: "Display Event 6"
    max: 255
  display_event_7:
    name: "Display Event 7"
    max: 255
  display_event_8:
    name: "Display Event 8"
    max: 255
  display_event_9:
    name: "Display Event 9"
    max: 255
  display_event_10:
    name: "Display Event 10"
    max: 255
  display_vejr_note:
    name: "Display Vejr Note"
    max: 255


# ---------- Automation ----------
automation:
  - alias: "Opdater display kalender og vejr"
    description: >
      Henter kalender-events fra 4 kalendere og timeprognoser
      fra weather.forecast_home. Opdaterer input_text helpers
      hvert kvarter så ESPHome kan vise dem.
    trigger:
      - platform: time_pattern
        minutes: "/15"
      - platform: homeassistant
        event: start
    action:

      # ── Kalender ──────────────────────────────────────
      - action: calendar.get_events
        data:
          duration:
            days: 14
        target:
          entity_id:
            - calendar.familie
            - calendar.your_calendar_2
            - calendar.your_calendar_3
            - calendar.your_calendar_4
        response_variable: cal_events

      - variables:
          sorted_events: >
            {% set ns = namespace(events=[]) %}
            {% for cal_id, cal_data in cal_events.items() %}
              {% for event in cal_data.events %}
                {% set start = event.start %}
                {% set all_day = start | length == 10 %}
                {% set date_str = start[:10] %}
                {% set dt = strptime(date_str, '%Y-%m-%d').date() %}
                {% set today = now().date() %}
                {% set delta = (dt - today).days %}
                {% if delta < 0 %}{% continue %}{% endif %}
                {% if delta == 0 %}{% set label = "I dag" %}
                {% elif delta == 1 %}{% set label = "I morgen" %}
                {% elif delta == 2 %}{% set label = "Overmorgen" %}
                {% else %}{% set label = dt.strftime('%-d. %b') %}{% endif %}
                {% if not all_day and start[11:16] != '00:00' %}
                  {% set label = label ~ ' ' ~ start[11:16] %}
                {% endif %}
                {% set ns.events = ns.events + [{'sort': start, 'text': label ~ ': ' ~ event.summary}] %}
              {% endfor %}
            {% endfor %}
            {{ (ns.events | sort(attribute='sort'))[:10] | to_json }}

      - repeat:
          count: 10
          sequence:
            - action: input_text.set_value
              target:
                entity_id: "input_text.display_event_{{ repeat.index }}"
              data:
                value: >
                  {% set ev = sorted_events | trim | from_json %}
                  {{ ev[repeat.index - 1].text if ev | length >= repeat.index else '' }}

      # ── Vejr-prognose: "Regn fra kl. 14" ─────────────
      - action: weather.get_forecasts
        data:
          type: hourly
        target:
          entity_id: weather.forecast_home
        response_variable: forecast_data

      - action: input_text.set_value
        target:
          entity_id: input_text.display_vejr_note
        data:
          value: >
            {% set forecasts = forecast_data['weather.forecast_home']['forecast'] %}
            {% set bad = {
              'rainy':           'Regn',
              'pouring':         'Kraftigt regn',
              'snowy':           'Sne',
              'snowy-rainy':     'Slud',
              'hail':            'Hagl',
              'lightning':       'Torden',
              'lightning-rainy': 'Torden og regn'
            } %}
            {% set current = states('weather.forecast_home') %}
            {% set ns = namespace(note='') %}
            {% for fc in forecasts[:12] %}
              {% if fc.condition in bad and ns.note == '' %}
                {% if fc.condition != current %}
                  {% set dt = strptime(fc.datetime[:19], '%Y-%m-%dT%H:%M:%S') %}
                  {% set ns.note = bad[fc.condition] ~ ' fra kl. ' ~ dt.strftime('%-H') %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {{ ns.note }}
