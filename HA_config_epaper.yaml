# ============================================================
# Home Assistant Package: ePaper Display
# ============================================================
# Copy this file to your HA config directory:
#   /config/HA_config_epaper.yaml
#
# Add to configuration.yaml:
#
#   homeassistant:
#     packages:
#       epaper: !include HA_config_epaper.yaml
#
# Restart HA after changes.
# ============================================================


# ============================================================
# LANGUAGE  –  edit only this section to change language
# ============================================================
template:
  - sensor:
      - name: "display_lang"
        state: "ok"
        attributes:
          # Weekdays (0=Sunday … 6=Saturday)
          weekdays:
            - "Søndag"
            - "Mandag"
            - "Tirsdag"
            - "Onsdag"
            - "Torsdag"
            - "Fredag"
            - "Lørdag"
          # Months (index 1–12, leave index 0 empty)
          months:
            - ""
            - "jan"
            - "feb"
            - "mar"
            - "apr"
            - "maj"
            - "jun"
            - "jul"
            - "aug"
            - "sep"
            - "okt"
            - "nov"
            - "dec"
          # Weather conditions
          weather_map:
            sunny:           "Solskin"
            clear-night:     "Klar nat"
            partlycloudy:    "Lidt skyer"
            cloudy:          "Overskyet"
            rainy:           "Regnvejr"
            pouring:         "Kraftigt regn"
            snowy:           "Snevejr"
            snowy-rainy:     "Slud"
            windy:           "Blæsevejr"
            windy-variant:   "Blæsevejr"
            fog:             "Tåget"
            hail:            "Haglvejr"
            lightning:       "Tordenvejr"
            lightning-rainy: "Torden og regn"
            exceptional:     "Usædvanligt"
          # Bad weather conditions used in forecast note
          forecast_bad:
            rainy:           "Regn"
            pouring:         "Kraftigt regn"
            snowy:           "Sne"
            snowy-rainy:     "Slud"
            hail:            "Hagl"
            lightning:       "Torden"
            lightning-rainy: "Torden og regn"
          forecast_from:     "fra kl."
          # Alarm states
          alarm_map:
            armed_away: "Alarm: ARMET"
            armed_home: "Alarm: ARMET"
            disarmed:   "Alarm: FRA"
            triggered:  "Alarm: UDLØST"
          # Labels
          indoor_prefix:  "Inde"
          cal_header:     "KALENDER"
          no_events:      "Ingen kommende events"
          today:          "I dag"
          tomorrow:       "I morgen"
          day_after:      "Overmorgen"
          # forecast_from: word between bad-weather label and hour, e.g. "Rain from 14"

          # ── Entity IDs – update to match your HA instance ──
          entity_outdoor_temp: "sensor.dantherm_outdoor_temperature"
          entity_indoor_temp:  "sensor.dantherm_extract_temperature"
          entity_weather:      "weather.forecast_home"
          entity_alarm:        "alarm_control_panel.home"
          entity_calendars:
            - "calendar.familie"
            - "calendar.your_calendar_2"
            - "calendar.your_calendar_3"
            - "calendar.your_calendar_4"

# ============================================================
# TEMPLATE SENSORS – no need to edit below this line
# ============================================================
      - name: "display_date_str"
        state: >
          {% set wd = state_attr('sensor.display_lang', 'weekdays') %}
          {% set mo = state_attr('sensor.display_lang', 'months') %}
          {% set n = now() %}
          {{ wd[n.strftime('%w')|int] }} {{ n.day }}. {{ mo[n.month] }} {{ n.year }}

      - name: "display_time_str"
        state: "{{ now().strftime('%H:%M') }}"

      - name: "display_weather_str"
        state: >
          {% set ws = states(state_attr('sensor.display_lang', 'entity_weather')) %}
          {% set map = state_attr('sensor.display_lang', 'weather_map') %}
          {% set vejr = map.get(ws, ws) %}
          {% set ude = states(state_attr('sensor.display_lang', 'entity_outdoor_temp'))|float(none) %}
          {{ vejr }}{% if ude is not none %}, {{ ude|round(1) }}°{% endif %}

      - name: "display_indoor_str"
        state: >
          {% set inde = states(state_attr('sensor.display_lang', 'entity_indoor_temp'))|float(none) %}
          {% set prefix = state_attr('sensor.display_lang', 'indoor_prefix') %}
          {% if inde is not none and inde != 0 %}{{ prefix }} {{ inde|round(1) }}°{% endif %}

      - name: "display_alarm_str"
        state: >
          {% set alarm = states(state_attr('sensor.display_lang', 'entity_alarm')) %}
          {% set map = state_attr('sensor.display_lang', 'alarm_map') %}
          {{ map.get(alarm, '?') }}

# ---------- Input text helpers (filled by automation below) ----------
input_text:
  display_event_1:
    name: "Display Event 1"
    max: 255
  display_event_2:
    name: "Display Event 2"
    max: 255
  display_event_3:
    name: "Display Event 3"
    max: 255
  display_event_4:
    name: "Display Event 4"
    max: 255
  display_event_5:
    name: "Display Event 5"
    max: 255
  display_event_6:
    name: "Display Event 6"
    max: 255
  display_event_7:
    name: "Display Event 7"
    max: 255
  display_event_8:
    name: "Display Event 8"
    max: 255
  display_event_9:
    name: "Display Event 9"
    max: 255
  display_event_10:
    name: "Display Event 10"
    max: 255
  display_vejr_note:
    name: "Display Weather Note"
    max: 255


# ---------- Automation ----------
automation:
  - id: epaper_opdater_kalender_og_vejr
    alias: "Update display calendar and weather"
    description: >
      Fetches calendar events and hourly weather forecasts.
      Updates input_text helpers every 15 minutes so ESPHome can display them.
      Entity IDs are configured in sensor.display_lang attributes.
    trigger:
      - platform: time_pattern
        minutes: "/15"
      - platform: homeassistant
        event: start
    action:

      # ── Calender ──────────────────────────────────────
      - action: calendar.get_events
        data:
          duration:
            days: 14
        target:
          entity_id: "{{ state_attr('sensor.display_lang', 'entity_calendars') }}"
        response_variable: cal_events

      - variables:
          sorted_events: >
            {% set lang = state_attr('sensor.display_lang', 'today') %}
            {% set lbl_today    = state_attr('sensor.display_lang', 'today') %}
            {% set lbl_tomorrow = state_attr('sensor.display_lang', 'tomorrow') %}
            {% set lbl_dayafter = state_attr('sensor.display_lang', 'day_after') %}
            {% set ns = namespace(events=[]) %}
            {% for cal_id, cal_data in cal_events.items() %}
              {% for event in cal_data.events %}
                {% set start = event.start %}
                {% set all_day = start | length == 10 %}
                {% set date_str = start[:10] %}
                {% set dt = strptime(date_str, '%Y-%m-%d').date() %}
                {% set today = now().date() %}
                {% set delta = (dt - today).days %}
                {% if delta < 0 %}{% continue %}{% endif %}
                {% if delta == 0 %}{% set label = lbl_today %}
                {% elif delta == 1 %}{% set label = lbl_tomorrow %}
                {% elif delta == 2 %}{% set label = lbl_dayafter %}
                {% else %}{% set label = dt.strftime('%-d. %b') %}{% endif %}
                {% if not all_day and start[11:16] != '00:00' %}
                  {% set label = label ~ ' ' ~ start[11:16] %}
                {% endif %}
                {% set ns.events = ns.events + [{'sort': start, 'text': label ~ ': ' ~ event.summary}] %}
              {% endfor %}
            {% endfor %}
            {{ (ns.events | sort(attribute='sort'))[:10] | to_json }}

      - repeat:
          count: 10
          sequence:
            - action: input_text.set_value
              target:
                entity_id: "input_text.display_event_{{ repeat.index }}"
              data:
                value: >
                  {% set ev = sorted_events | trim | from_json %}
                  {{ ev[repeat.index - 1].text if ev | length >= repeat.index else '' }}

      # ── Weather ─────────────
      - action: weather.get_forecasts
        data:
          type: hourly
        target:
          entity_id: "{{ state_attr('sensor.display_lang', 'entity_weather') }}"
        response_variable: forecast_data

      - action: input_text.set_value
        target:
          entity_id: input_text.display_vejr_note
        data:
          value: >
            {% set weather_entity = state_attr('sensor.display_lang', 'entity_weather') %}
            {% set forecasts = forecast_data[weather_entity]['forecast'] %}
            {% set bad = state_attr('sensor.display_lang', 'forecast_bad') %}
            {% set from_str = state_attr('sensor.display_lang', 'forecast_from') %}
            {% set current = states(weather_entity) %}
            {% set ns = namespace(note='') %}
            {% for fc in forecasts[:12] %}
              {% if fc.condition in bad and ns.note == '' %}
                {% if fc.condition != current %}
                  {% set dt = strptime(fc.datetime[:19], '%Y-%m-%dT%H:%M:%S') %}
                  {% set ns.note = bad[fc.condition] ~ ' ' ~ from_str ~ ' ' ~ dt.strftime('%-H') %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {{ ns.note }}
